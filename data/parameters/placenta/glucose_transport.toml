# Placental glucose-transport parameters.
#
# Michaelis-Menten kinetics of facilitated glucose diffusion across
# the syncytiotrophoblast.

[[parameter]]
id = "placenta-glucose-glut1-km-mmol-per-l"
name = "GLUT1 affinity for glucose"
description = "Michaelis constant for GLUT1-mediated glucose transport on the syncytiotrophoblast microvillous membrane."
tier = "B"
unit = "mmol/L"
value = { kind = "normal", mean = 2.5, sd = 0.5 }
citation = "illsley-2000-glut1"
population = "Human term syncytiotrophoblast microvillous membrane vesicles"
age_range = { min_weeks = 37, max_weeks = 40 }
technique = "Vesicle uptake kinetics"

[[parameter]]
id = "placenta-glucose-glut1-vmax-per-area-mmol-per-min-per-m2"
name = "GLUT1 maximum transport rate per unit area"
description = "Maximum facilitated-diffusion flux per unit villous surface area via GLUT1."
tier = "C"
unit = "mmol/min/m^2"
value = { kind = "point", value = 0.075, uncertainty = 0.02 }
citation = "illsley-2000-glut1"
population = "Human term syncytiotrophoblast"
age_range = { min_weeks = 8, max_weeks = 40 }
caveats = "Vmax extrapolated from vesicle-protein assays scaled to whole-placenta villous surface area; tier C reflects the extrapolation."

[[parameter]]
id = "placenta-glucose-glut3-km-mmol-per-l"
name = "GLUT3 affinity for glucose"
description = "Michaelis constant for GLUT3-mediated glucose transport on the syncytiotrophoblast basal membrane."
tier = "B"
unit = "mmol/L"
value = { kind = "normal", mean = 1.5, sd = 0.3 }
citation = "baumann-2002-glut3"
population = "Human syncytiotrophoblast basal membrane"
age_range = { min_weeks = 8, max_weeks = 40 }

[[parameter]]
id = "placenta-glucose-glut3-vmax-per-area-mmol-per-min-per-m2"
name = "GLUT3 maximum transport rate per unit area"
description = "Maximum facilitated-diffusion flux per unit villous surface area via GLUT3."
tier = "C"
unit = "mmol/min/m^2"
value = { kind = "point", value = 0.020, uncertainty = 0.005 }
citation = "brown-2011-glut3"
population = "Human syncytiotrophoblast across gestation"
age_range = { min_weeks = 8, max_weeks = 40 }
caveats = "GLUT3 expression rises through gestation; this is a term-equivalent reference value."
