name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: ruff check
        run: ruff check python/ dashboard/ scripts/
      - name: ruff format --check
        run: ruff format --check python/ dashboard/ scripts/

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package and dev deps
        working-directory: python
        run: pip install -e ".[dev]"
      - name: mypy
        working-directory: python
        run: mypy nidus

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package and dev deps
        working-directory: python
        run: pip install -e ".[dev]"
      - name: pytest with coverage
        working-directory: python
        run: |
          pytest -v --tb=short \
            --cov=nidus \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=85
      - name: Upload coverage XML
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: python/coverage.xml
      - name: Execute reference notebooks
        run: pytest --nbmake -v notebooks/

  validate-dataset:
    name: Validate dataset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package
        working-directory: python
        run: pip install -e .
      - name: nidus.validate()
        run: python -c "import nidus; nidus.validate(); print('Dataset OK')"

  regenerate-exports:
    name: Regenerate SBML / CellML / PhysioCell / OMEX exports
    needs: validate-dataset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package with [export] extra
        working-directory: python
        run: pip install -e ".[export]"
      - name: Regenerate every exchange format
        run: |
          set -euo pipefail
          mkdir -p exports/cellml-1.1
          nidus export --format sbml       --output exports/sbml/
          nidus export --format cellml     --output exports/cellml/
          nidus export --format cellml     --output exports/cellml-1.1/ --cellml-version 1.1
          nidus export --format physiocell --output exports/physiocell/
          nidus export --format composed   --output exports/composed/
          nidus export --format omex       --output exports/nidus_pregnancy.omex
      - name: Sanity-check the output shape
        run: |
          set -euo pipefail
          test "$(ls exports/sbml/*.xml | wc -l)" -ge 41
          test "$(ls exports/cellml/*.cellml | wc -l)" -ge 41
          test "$(ls exports/cellml-1.1/*.cellml | wc -l)" -ge 41
          test -f exports/physiocell/nidus-parameters.xml
          test -f exports/nidus_pregnancy.omex
          ls -la exports/composed/
      - uses: actions/upload-artifact@v4
        with:
          name: nidus-exports
          path: exports/
          retention-days: 30

  build:
    name: Build wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build
        run: pip install build
      - name: Sync dataset into package source tree
        run: python scripts/sync_dataset_into_package.py
      - name: Build wheel + sdist
        working-directory: python
        run: python -m build
      - name: Inspect wheel — dataset must be bundled
        working-directory: python
        run: |
          set -euo pipefail
          mkdir _wheel_check
          unzip -q -d _wheel_check dist/*.whl
          echo "--- bundled dataset contents ---"
          find _wheel_check/nidus/_dataset -type f | sort
          test -f _wheel_check/nidus/_dataset/tiers/tiers.json
          test -f _wheel_check/nidus/_dataset/citations/citations.json
          test -f _wheel_check/nidus/_dataset/schema/parameter.schema.json
          # At least one subsystem JSON must be present.
          test -n "$(ls _wheel_check/nidus/_dataset/parameters/*.json)"
      - name: Smoke-test installed wheel
        working-directory: python
        run: |
          set -euo pipefail
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/python -c "
          import nidus
          ds = nidus.load()
          assert len(ds) >= 230, f'expected >=230 parameters, got {len(ds)}'
          assert len(ds.citations) >= 65, f'expected >=65 citations, got {len(ds.citations)}'
          nidus.validate()
          print(f'Installed wheel works: {ds}')
          "
      - uses: actions/upload-artifact@v4
        with:
          name: nidus-wheel
          path: python/dist/*
