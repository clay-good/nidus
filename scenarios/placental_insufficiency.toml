name = "Placental insufficiency"
description = "Placental insufficiency modelled as a reduction in effective term placental exchange surface area (scaffold values; pending parameter-database integration). Used to reproduce the qualitative pattern of reduced fetal umbilical-vein PO₂ and depressed cerebral PO₂ associated with growth restriction."
start_age_weeks = 8
end_age_weeks = 40
seed = 0
subscribers = ["maternal-cardio", "placenta", "fetal"]

[overrides.placenta_structure]
# Term area roughly halved from the scaffold default of 12 m².
term_area_m2 = 6.0
