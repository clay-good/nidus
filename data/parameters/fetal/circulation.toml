# Fetal circulation parameters.
#
# Streamline-preference and shunt-fraction parameters used by the
# FetalSpecialCirculation model.

[[parameter]]
id = "fetal-circulation-foramen-ovale-streamline-preference"
name = "Foramen ovale streamline preference"
description = "Fraction of oxygenated umbilical-vein return preferentially streamed through the foramen ovale toward the cerebral circulation."
tier = "C"
unit = "fraction"
value = { kind = "point", value = 0.55, uncertainty = 0.10 }
citation = "rudolph-1985-fetal-circulation"
population = "Late-gestation fetal lamb (extrapolated to human fetus)"
age_range = { min_weeks = 16, max_weeks = 40 }
caveats = "Direct human in-vivo measurements are limited; Rudolph's lamb data is the standard reference."

[[parameter]]
id = "fetal-circulation-ductus-arteriosus-share"
name = "Ductus arteriosus flow share"
description = "Fraction of right-ventricular output that bypasses the lungs via the ductus arteriosus to the descending aorta."
tier = "C"
unit = "fraction"
value = { kind = "point", value = 0.85, uncertainty = 0.05 }
citation = "rudolph-1985-fetal-circulation"
population = "Late-gestation fetal lamb (extrapolated to human fetus)"
age_range = { min_weeks = 16, max_weeks = 40 }

[[parameter]]
id = "fetal-circulation-systemic-venous-return-po2-mmhg"
name = "Systemic venous return PO2"
description = "Effective PO2 of systemic venous return mixing into the right atrium of the fetal heart."
tier = "C"
unit = "mmHg"
value = { kind = "point", value = 15.0, uncertainty = 3.0 }
citation = "kiserud-2000-fetal-circulation"
population = "Healthy late-gestation human fetus"
age_range = { min_weeks = 28, max_weeks = 40 }
caveats = "Estimated from ductus venosus Doppler studies; tier C reflects indirect measurement."
