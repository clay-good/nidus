name: Research question (Tier-D candidate)
description: Propose a hypothesised mechanism or open question for the dataset's Tier-D registry.
title: "[research-question] "
labels: ["tier-d", "discussion"]
body:
  - type: markdown
    attributes:
      value: |
        Tier-D entries in the nidus dataset are **structured open
        questions**: hypothesised mechanisms or channels that lack
        quantitative literature, listed so the field knows what's worth
        measuring next.

        Use this template to propose a Tier-D candidate. Once one or two
        peer-reviewed studies establish a value range, the entry can be
        promoted to Tier-C via a parameter request.
  - type: textarea
    id: question
    attributes:
      label: The question
      description: One or two sentences naming the hypothesised mechanism or unmeasured quantity and the gestational subsystem it affects.
    validations:
      required: true
  - type: dropdown
    id: subsystem
    attributes:
      label: Likely subsystem
      options:
        - maternal_cardiovascular
        - maternal_blood
        - maternal_respiratory
        - maternal_renal
        - placental_structure
        - placental_gas_exchange
        - placental_glucose
        - fetal_circulation
        - fetal_growth
        - fetal_metabolism
        - cross-subsystem / not sure
    validations:
      required: true
  - type: textarea
    id: prior_art
    attributes:
      label: Prior art
      description: Papers, reviews, or anecdotal observations supporting (and questioning) the proposal. If quantitative data already exists, this is probably a parameter request rather than a Tier-D candidate.
    validations:
      required: true
  - type: textarea
    id: measurement
    attributes:
      label: What measurement would promote this from Tier D
      description: What study design or instrument would yield the data needed to give this a quantitative value range?
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
