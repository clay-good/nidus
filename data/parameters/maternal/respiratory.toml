# Maternal respiratory parameters.
#
# Pregnancy increases minute ventilation by ~30-50%, producing a mild
# compensated respiratory alkalosis with reduced PaCO2 and slightly
# elevated PaO2.

[[parameter]]
id = "maternal-respiratory-minute-ventilation-l-per-min"
name = "Maternal minute ventilation at term"
description = "Resting minute ventilation at term; increased ~30-50% above non-pregnant baseline."
tier = "B"
unit = "L/min"
value = { kind = "normal", mean = 10.5, sd = 1.8 }
citation = "lomauro-aliverti-2015-respiratory"
population = "Healthy singleton pregnancies, term"
age_range = { min_weeks = 36, max_weeks = 40 }
technique = "Spirometry / open-circuit indirect calorimetry"

[[parameter]]
id = "maternal-respiratory-tidal-volume-ml-term"
name = "Maternal tidal volume at term"
description = "Resting tidal volume at term."
tier = "B"
unit = "mL"
value = { kind = "normal", mean = 680.0, sd = 110.0 }
citation = "crapo-1996-pregnancy-respiratory"
population = "Healthy singleton pregnancies, term"
age_range = { min_weeks = 36, max_weeks = 40 }
technique = "Spirometry"

[[parameter]]
id = "maternal-respiratory-paco2-mmhg-term"
name = "Maternal arterial PCO2 at term"
description = "Arterial PaCO2 at term; reduced by physiological hyperventilation."
tier = "A"
unit = "mmHg"
value = { kind = "normal", mean = 30.0, sd = 2.0 }
citation = "lomauro-aliverti-2015-respiratory"
population = "Healthy singleton pregnancies, term"
age_range = { min_weeks = 36, max_weeks = 40 }
technique = "Arterial blood-gas analysis"
caveats = "Non-pregnant reference 40 mmHg; pregnancy reference 28-32 mmHg."

[[parameter]]
id = "maternal-respiratory-pao2-mmhg-term"
name = "Maternal arterial PO2 at term"
description = "Arterial PaO2 at term; mildly elevated relative to non-pregnant baseline."
tier = "A"
unit = "mmHg"
value = { kind = "normal", mean = 103.0, sd = 5.0 }
citation = "lomauro-aliverti-2015-respiratory"
population = "Healthy singleton pregnancies, term"
age_range = { min_weeks = 36, max_weeks = 40 }
technique = "Arterial blood-gas analysis"

[[parameter]]
id = "maternal-respiratory-p50-shift-mmhg"
name = "Pregnancy P50 shift"
description = "Rightward shift in maternal oxyhaemoglobin P50 in pregnancy, attributed to elevated 2,3-BPG."
tier = "B"
unit = "mmHg"
value = { kind = "normal", mean = 3.0, sd = 1.0 }
citation = "kelman-1966-o2-saturation"
population = "Healthy singleton pregnancies, third trimester"
age_range = { min_weeks = 28, max_weeks = 40 }
caveats = "Reported shift varies by methodology and 2,3-BPG measurement; a 2-4 mmHg range is most commonly cited."
