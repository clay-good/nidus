# Placental structural parameters.
#
# Trajectory parameters consumed by the PlacentalStructure subscriber.
# Villous surface area rises from ~0.5 m^2 in early pregnancy to a
# term value of ~11-12 m^2 (Mayhew 2014 stereology).

[[parameter]]
id = "placenta-structure-initial-area-m2"
name = "Initial villous surface area"
description = "Effective villous exchange surface area at the start of gestation (early-pregnancy reference)."
tier = "B"
unit = "m^2"
value = { kind = "normal", mean = 0.5, sd = 0.1 }
citation = "mayhew-2014-placental-morphometry"
population = "Stereological measurements of human placentae across gestation"
age_range = { min_weeks = 8, max_weeks = 12 }
technique = "Light-microscopic stereology"

[[parameter]]
id = "placenta-structure-term-area-m2"
name = "Term villous surface area"
description = "Effective villous exchange surface area at term."
tier = "B"
unit = "m^2"
value = { kind = "normal", mean = 11.5, sd = 1.5 }
citation = "mayhew-2014-placental-morphometry"
population = "Term human placentae"
age_range = { min_weeks = 37, max_weeks = 40 }
technique = "Light-microscopic stereology"

[[parameter]]
id = "placenta-structure-midpoint-week"
name = "Placental growth midpoint week"
description = "Gestational age at which villous-area logistic growth reaches its inflection point."
tier = "C"
unit = "weeks"
value = { kind = "point", value = 22.0, uncertainty = 2.0 }
citation = "carter-2009-placental-development"
population = "Reference placental development"
age_range = { min_weeks = 8, max_weeks = 40 }
caveats = "Logistic-shape fit parameter; not reported directly in source."

[[parameter]]
id = "placenta-structure-growth-rate-per-week"
name = "Placental growth-rate parameter"
description = "Logistic growth-rate coefficient for the villous surface-area trajectory."
tier = "C"
unit = "1/week"
value = { kind = "point", value = 0.18, uncertainty = 0.04 }
citation = "carter-2009-placental-development"
population = "Reference placental development"
age_range = { min_weeks = 8, max_weeks = 40 }
caveats = "Logistic-shape fit parameter; not reported directly in source."

[[parameter]]
id = "placenta-structure-membrane-thickness-um"
name = "Villous membrane thickness at term"
description = "Arithmetic mean villous membrane thickness at term."
tier = "B"
unit = "micrometres"
value = { kind = "normal", mean = 4.5, sd = 0.8 }
citation = "mayhew-2014-placental-morphometry"
population = "Term human placentae"
age_range = { min_weeks = 37, max_weeks = 40 }
technique = "Electron-microscopic stereology"
