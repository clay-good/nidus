# Fetal growth parameters.
#
# Estimated fetal weight at selected gestational ages, drawn from the
# NICHD Fetal Growth Studies multi-ethnic singleton reference.

[[parameter]]
id = "fetal-growth-efw-20w-g"
name = "Estimated fetal weight at 20 weeks"
description = "Singleton estimated fetal weight (50th percentile) at 20 weeks gestation."
tier = "A"
unit = "g"
value = { kind = "normal", mean = 331.0, sd = 35.0 }
citation = "buck-louis-2015-nichd-growth"
population = "NICHD Fetal Growth Studies multi-ethnic singleton cohort"
age_range = { min_weeks = 20, max_weeks = 20 }
technique = "Hadlock biometric formula on ultrasound measurements"

