[[parameter]]
id = "fetal-growth-hadlock-coefficient"
name = "Hadlock estimated-fetal-weight coefficient"
description = "Lead coefficient of the Hadlock formula log10(EFW) = 1.3596 - 0.00386·AC·FL + 0.0064·HC + ..."
tier = "A"
unit = "log10(g)"
value = { kind = "point", value = 1.3596 }
citation = "hadlock-1991-fetal-weight"
population = "Mixed obstetric ultrasound cohort"
age_range = { min_weeks = 10, max_weeks = 41 }
caveats = "Specific to the four-parameter Hadlock (1991) formula; alternative formulae have different coefficients."
