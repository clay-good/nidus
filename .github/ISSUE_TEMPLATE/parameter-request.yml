name: Parameter request
description: Propose a new physiological parameter for the dataset, or a revision of an existing one against a published source.
title: "[parameter] "
labels: ["parameter", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template to propose an entry for `dataset/parameters/` or
        to revise an existing one. A reviewer will need to verify every
        number against the cited source PDF, so please link to it.

        See [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md) for the tier
        system and the verification standard.
  - type: input
    id: parameter_id
    attributes:
      label: Proposed parameter id
      description: Dotted, with snake_case tokens — e.g. `placental_glucose.glut1_km`.
      placeholder: subsystem.quantity_modifier
    validations:
      required: true
  - type: dropdown
    id: subsystem
    attributes:
      label: Subsystem
      options:
        - maternal_cardiovascular
        - maternal_blood
        - maternal_respiratory
        - maternal_renal
        - placental_structure
        - placental_gas_exchange
        - placental_glucose
        - fetal_circulation
        - fetal_growth
        - fetal_metabolism
    validations:
      required: true
  - type: dropdown
    id: tier
    attributes:
      label: Proposed confidence tier
      description: See CONTRIBUTING.md for the criteria. Choose conservatively — tier inflation is a worse error than tier deflation.
      options:
        - A — 3+ independent studies, overlapping CIs, validated across populations
        - B — 1–2 longitudinal studies (n≥100), plausible mechanism
        - C — single study, or cross-sectional only, or small n
        - D — hypothesised; no quantitative literature
    validations:
      required: true
  - type: textarea
    id: value
    attributes:
      label: Proposed value
      description: Central estimate with uncertainty (low/high or SD), and units. Match the schema's `value` object semantics.
      placeholder: "central=12.0, low=9.5, high=14.5, units=m^2 — term villous surface area"
    validations:
      required: true
  - type: textarea
    id: citation
    attributes:
      label: Citation
      description: Authors, title, venue, year, DOI or PMID. Attach or link the source PDF if you can.
    validations:
      required: true
  - type: textarea
    id: population
    attributes:
      label: Population and gestational-age range
      description: Whose data is this and which weeks does it cover? Note any exclusions (twins, chronic hypertension, etc.).
    validations:
      required: true
  - type: input
    id: extraction
    attributes:
      label: Extraction method
      description: How was the value pulled from the source? e.g. "table 2, column 3" or "figure 4, digitised".
      placeholder: "table 2, column 3"
  - type: checkboxes
    id: verification
    attributes:
      label: Verification
      options:
        - label: I have personally consulted the cited paper, not just an abstract or a downstream review.
          required: true
        - label: The cohort, gestational window, and units in the source match what I am proposing.
          required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Caveats, conflicts with existing entries, applicability limits.
